name: Generate Ascii 

on: push

jobs:
  ascii_job:
    runs-on: ubuntu-latest
    steps:
        - name: checkout repo
          uses: actions/checkout@v6
          
        - name: List Repo Files
          run: ls -lrta

        - name: Run Shell Scripts
          run: |
            chmod +x ascii-scripts.sh
            ./ascii-scripts.sh

