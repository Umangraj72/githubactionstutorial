# Name that you will see in action tab
name: My First Workflow

# triggers/event-you can give multiple option in []
on : push

# collection of steps/task you need to run
jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo
          uses: actions/checkout@v6

        - name: List and Read files
          run: |
            echo "My first Github Action Job"
            ls
            cat README.md                                       

